<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#d9468f"><title>Admin - Agenda Manicure</title><link rel="manifest" href="../manifest.json"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="../css/style.css"></head>
<body><div id="toast" class="toast"></div><main class="container" style="max-width:460px;padding-top:36px"><section class="hero"><div class="brand"><div class="logo"><i class="fa-solid fa-lock"></i></div><div><h1>Área da manicure</h1><p>Entre para controlar a agenda</p></div></div></section><section class="card" style="margin-top:18px"><div class="field"><label>Senha de acesso</label><input id="password" type="password" placeholder="Digite a senha"></div><button id="loginBtn" class="btn btn-primary btn-full"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button><p class="muted small">Senha inicial da demonstração: <b>1234</b>. Depois altere em Configurações.</p></section><a class="btn btn-light btn-full" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Voltar para agenda pública</a></main><script type="module">
import { Store } from '../js/storage.js';import { $, toast } from '../js/utils.js';
$('#loginBtn').onclick=()=>{const pass=$('#password').value; if(pass===Store.getSettings().adminPassword){sessionStorage.setItem('agenda_admin_logged','1'); location.href='agenda.html';} else toast('Senha incorreta.');};
$('#password').addEventListener('keydown',e=>{if(e.key==='Enter')$('#loginBtn').click()});
</script></body></html>
